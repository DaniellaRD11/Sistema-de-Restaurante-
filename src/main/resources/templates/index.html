<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Restaurante</title>
    <style>
        /* --- PALETA DE COLORES --- */
        :root {
            --bg-crema: #FFF8E1;       
            --naranja-fuerte: #E65100; 
            --naranja-suave: #FF9800;  
            --blanco: #FFFFFF;         
            --gris-texto: #4E342E;     
            --sombra: rgba(230, 81, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-crema);
            color: var(--gris-texto);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            position: relative; /* Necesario para posicionar el botón de salir */
        }

        h1 {
            color: var(--naranja-fuerte);
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        /* --- BOTÓN CERRAR SESIÓN (NUEVO) --- */
        .logout-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .btn-logout {
            background-color: transparent;
            border: 2px solid var(--naranja-fuerte);
            color: var(--naranja-fuerte);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-logout:hover {
            background-color: var(--naranja-fuerte);
            color: white;
            transform: scale(1.05);
        }

        /* --- DASHBOARD --- */
        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        .card {
            background-color: var(--blanco);
            border-radius: 20px;
            padding: 30px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px var(--sombra);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 6px solid var(--naranja-suave);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(230, 81, 0, 0.25);
        }

        .card h2 {
            color: var(--naranja-fuerte);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .card p {
            color: #795548;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        hr {
            border: 0;
            height: 1px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(255, 152, 0, 0.75), rgba(0, 0, 0, 0));
            margin: 20px 0;
        }

        /* --- BOTONES DEL PANEL --- */
        .btn {
            display: block;
            width: 100%;
            background-color: var(--naranja-fuerte);
            color: white;
            padding: 12px 0;
            margin: 10px 0;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.3s, transform 0.2s;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: var(--naranja-suave);
            transform: scale(1.02);
            cursor: pointer;
        }

        .btn-pedido {
            background: linear-gradient(45deg, #FF6D00, #FF9100);
            box-shadow: 0 4px 15px rgba(255, 109, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="logout-container">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">
                🚪 Cerrar Sesión
            </button>
        </form>
    </div>

    <h1>Bienvenido al Sistema</h1>

    <div class="dashboard-container">

        <div class="card" sec:authorize="hasRole('GERENTE')">
            <h2>👨‍💼 Panel de Gerencia</h2>
            <p>Gestión administrativa del restaurante.</p>
            <hr>
            <p style="font-size: 0.85rem; font-weight: bold;">ACCIONES DISPONIBLES</p>
            
            <a th:href="@{/vistas/gerente/registro}" class="btn">Registrar Personal</a>
            <a th:href="@{/vistas/gerente/insumos}" class="btn">Gestionar Insumos</a>
            <a th:href="@{/vistas/gerente/menu}" class="btn">Gestionar Menú</a>
            <a th:href="@{/vistas/gerente/reportes}" class="btn">Ver Reportes</a>
        </div>

        <div class="card" sec:authorize="hasAnyRole('MESERO', 'GERENTE')">
            <h2>🍽️ Zona de Pedidos</h2>
            <p>Atención a mesas y clientes.</p>
            <hr>
            <p style="font-size: 0.85rem; font-weight: bold;">SERVICIO</p>
            
            <a th:href="@{/pedido/Listar}" class="btn btn-pedido">Ir a Menú de Pedidos</a>
        </div>

    </div>

</body>
</html>
