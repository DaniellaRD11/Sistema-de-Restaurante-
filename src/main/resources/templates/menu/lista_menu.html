<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Menú - NEXT FOOD</title>
    <style>
        :root {
            --color-fondo: #FAF8F5; --color-tarjeta: #FFFFFF;
            --color-primario: #F97316; --color-texto: #333333;
            --color-borde: #F97316; --color-estado-disponible: #22C55E;
            --color-estado-agotado: #EF4444;
        }
        body {
            font-family: Arial, sans-serif; background-color: var(--color-fondo);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 2rem;
            color: var(--color-texto); box-sizing: border-box;
        }
        .main-container {
            background-color: var(--color-tarjeta); border-radius: 20px;
            padding: 2.5rem; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 90%; max-width: 900px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem;
        }
        .header h1 { color: var(--color-primario); font-size: 2rem; margin: 0; }
        
        .btn-agregar {
            background-color: var(--color-primario); color: white; border: none;
            padding: 0.8rem 1.5rem; border-radius: 12px; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: background-color 0.3s;
        }
        .btn-agregar:hover { background-color: #E7640D; }
        .tabla-menu { width: 100%; border-collapse: collapse; }
        .tabla-menu th, .tabla-menu td {
            text-align: left; padding: 1rem; border-bottom: 1px solid #F0F0F0;
        }
        .tabla-menu th { color: #888; font-size: 0.85rem; text-transform: uppercase; }
        .estado { padding: 0.3rem 0.6rem; border-radius: 8px; font-size: 0.9rem; font-weight: bold; color: white; }
        .estado-disponible { background-color: var(--color-estado-disponible); }
        .estado-agotado { background-color: var(--color-estado-agotado); }
        .acciones a { text-decoration: none; font-size: 1.2rem; margin-right: 0.5rem; }

        /* --- ESTILOS PARA EL BOTÓN DE SALIR --- */
        .btn-salir {
            display: inline-block;
            padding: 0.7rem 1.5rem;
            border: 2px solid var(--color-borde);
            color: var(--color-primario);
            background-color: transparent;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s;
            align-self: center; /* Alinea verticalmente con el título */
        }
        .btn-salir:hover {
            background-color: var(--color-primario);
            color: white;
        }
        /* --- FIN DE ESTILOS DE BOTÓN DE SALIR --- */


        /* Estilos para el formulario */
        .form-agregar {
            background-color: #FDFDFD; border: 1px solid #F0F0F0;
            border-radius: 12px; padding: 2rem; margin-top: 2rem;
        }
        .form-agregar h2 { margin-top: 0; color: var(--color-primario); }
        .form-grupo { margin-bottom: 1.5rem; }
        .form-grupo label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        .form-grupo input[type="text"],
        .form-grupo input[type="number"],
        .form-grupo textarea,
        .form-grupo select {
            width: 100%; padding: 0.8rem; border: 1px solid #DDD;
            border-radius: 8px; box-sizing: border-box; font-family: Arial, sans-serif;
        }
        .form-grupo textarea { resize: vertical; min-height: 80px; }
        .form-grupo-inline { display: flex; gap: 1rem; }
        .form-grupo-inline .form-grupo { flex: 1; }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="header">
            <h1>Gestión de Menú</h1>
            <a th:href="@{/index.html}" class="btn-salir">Volver al Inicio</a>
        </div>

        <table class="tabla-menu">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="plato : ${listaPlatos}">
                    <td th:text="${plato.nombre}">Lomo Saltado</td>
                    <td th:text="${plato.categoria}">Platos Fuertes</td>
                    <td th:text="${'$' + #numbers.formatDecimal(plato.precio, 1, 'COMMA', 2, 'POINT')}">$15.00</td>
                    <td>
                        <span th:if="${plato.disponible.toString() == 'Disponible'}" class="estado estado-disponible">Disponible</span>
                        <span th:if="${plato.disponible.toString() == 'Agotado'}" class="estado estado-agotado">Agotado</span>
                    </td>
                    <td class="acciones">
                        <a th:href="@{/menu/editar/{id}(id=${plato.platoId})}" title="Editar">Editar</a>
                        <a th:href="@{/menu/eliminar/{id}(id=${plato.platoId})}" title="Eliminar">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <form class="form-agregar" 
              th:action="@{/menu/guardar}" 
              th:object="${plato}" 
              method="POST">
            
            <h2>+ Agregar Nuevo Plato o Bebida</h2>

            <div class="form-grupo">
                <label for="nombre">Nombre del Plato o bebida</label>
                <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej: Lomo Saltado o limonada" required>
            </div>
            
            <div class="form-grupo">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" th:field="*{descripcion}" placeholder="Ej: Plato tradicional con lomo, papas y arroz"></textarea>
            </div>

            <div class="form-grupo-inline">
                <div class="form-grupo">
                    <label for="categoria">Categoría</label>
                    <input type="text" id="categoria" th:field="*{categoria}" placeholder="Ej: Platos Fuertes" required>
                </div>
                <div class="form-grupo">
                    <label for="precio">Precio</label>
                    <input type="number" id="precio" th:field="*{precio}" step="0.01" placeholder="Ej: 15.00" required>
                </div>
            </div>
            
            <div class="form-grupo">
                <label for="disponible">Estado</label>
                <select id="disponible" th:field="*{disponible}">
                    <option value="Disponible">Disponible</option>
                    <option value="Agotado">Agotado</option>
                </select>
            </div>

            <button type="submit" class="btn-agregar">Guardar </button>
        </form>

    </div>

</body>
</html>
