<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario - NEXT FOOD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f3eb;
            font-family: 'Segoe UI', sans-serif;
        }
        .titulo-principal {
            color: #ff7043;
            font-weight: bold;
            text-align: center;
            font-size: 2.5rem;
        }
        .subtitulo {
            color: #ff7043;
            text-align: center;
            font-weight: 600;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }
        .btn-nuevo {
            background-color: #28a745;
            border: none;
        }
        .btn-nuevo:hover {
            background-color: #218838;
        }
        .btn-warning {
            background-color: #ffb74d;
            border: none;
        }
        .btn-warning:hover {
            background-color: #ffa726;
        }
        .btn-secondary {
            border: 2px solid #ff7043;
            color: #ff7043;
            background-color: transparent;
        }
        .btn-secondary:hover {
            background-color: #ff7043;
            color: white;
        }
        .btn-danger {
            border: 2px solid #ff7043;
            color: #ff7043;
            background-color: transparent;
        }
        .btn-danger:hover {
            background-color: #ff7043;
            color: white;
        }
        table {
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>

<body>

```
<div class="container mt-4 p-4 rounded">
    <h1 class="titulo-principal mb-4">NEXT FOOD</h1>
    <h3 class="subtitulo">📦 INVENTARIO DE INSUMOS</h3>

    <!-- Barra de búsqueda -->
    <form th:action="@{/insumo/buscar}" method="get" class="d-flex mb-3">
        <input class="form-control me-2" type="search" name="nombre" placeholder="Buscar insumo..." aria-label="Buscar">
        <button class="btn btn-outline-success" type="submit">Buscar</button>
    </form>

    <!-- Botones de acción -->
    <div class="mb-3 d-flex justify-content-between">
		<a class="btn btn-success" th:href="@{/insumo/nuevo}">
		    <i class="bi bi-plus"></i> Nuevo Insumo
		</a>
        <a th:href="@{/insumo/bajo-stock}" class="btn btn-warning text-dark-light">⚠️ Ver Bajo Stock</a>
    </div>

    <!-- Tabla de insumos -->
    <table class="table table-hover table-bordered align-middle text-center bg-white shadow-sm">
        <thead class="table-light">
            <tr>
                <th>   </th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Unidad</th>
                <th>Cantidad Actual</th>
                <th>Cantidad Mínima</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="insumo : ${insumos}">
                <td th:text="${insumo.insumoId}"></td>
                <td th:text="${insumo.nombre}"></td>
                <td th:text="${insumo.descripcion}"></td>
                <td th:text="${insumo.unidad}"></td>
                <td th:text="${insumo.cantidadActual}"></td>
                <td th:text="${insumo.cantidadMinima}"></td>
                <td>
                    <span th:switch="${insumo.estado}" class="badge">
                        <span th:case="'AGOTADO'" class="badge bg-danger" th:text="${insumo.estado}"></span>
                        <span th:case="'BAJO'" class="badge bg-warning text-dark" th:text="${insumo.estado}"></span>
                        <span th:case="*" class="badge bg-success" th:text="${insumo.estado}"></span>
                    </span>
                </td>
                <td>
                    <a th:href="@{'/insumo/editar/' + ${insumo.insumoId}}" class="btn btn-sm btn-secondary">Editar</a>
                    <a th:href="@{'/insumo/eliminar/' + ${insumo.insumoId}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Seguro que deseas eliminar este insumo?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="text-center mt-3">
        <a href="/" class="btn btn-cancelar">Salir</a>
    </div>
</div>


</body>
</html>
